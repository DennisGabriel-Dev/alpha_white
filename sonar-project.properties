# Configuração do SonarScanner para o Alpha White.
# Gere um token em http://localhost:9000 → My Account → Security → Generate Tokens
# e exporte: export SONAR_TOKEN=seu_token, ou coloque em .env.sonar (NECESSÁRIO CRIAR ARQUIVO .env.sonar)

sonar.projectKey=alpha_white
sonar.projectName=Alpha White
sonar.projectVersion=1.0

sonar.sourceEncoding=UTF-8
sonar.sources=app,lib,config
sonar.tests=spec

sonar.exclusions=\
  **/vendor/**,\
  **/tmp/**,\
  **/storage/**,\
  **/log/**,\
  **/public/**,\
  **/db/**,\
  **/bin/**,\
  **/node_modules/**,\
  **/app/assets/builds/**,\
  **/coverage/**

sonar.test.exclusions=\
  spec/fixtures/**,\
  spec/support/**

# Cobertura: make test-coverage gera coverage/sonar-coverage.xml
sonar.coverageReportPaths=coverage/sonar-coverage.xml
