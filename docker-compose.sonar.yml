# SonarQube — stack isolada (não usa o db da aplicação alpha_white).
# Docs: https://docs.sonarsource.com/sonarqube-server/latest/setup-and-upgrade/install-the-server/installing-sonarqube-from-docker
#
# Subir:  make sonar-up
# UI:     http://localhost:9000  (admin / admin)
# Scan:   make sonar-scan  (após gerar token em My Account > Security)

name: alpha_white_sonar

services:
  sonar-db:
    image: postgres:17-alpine
    container_name: sonarqube_db
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d sonar -U sonar"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - sonarqube_postgresql:/var/lib/postgresql/data
    networks:
      - sonar

  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    hostname: sonarqube
    read_only: true
    depends_on:
      sonar-db:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_temp:/opt/sonarqube/temp
    tmpfs:
      - /tmp:size=256M,mode=1777
    networks:
      - sonar

  # Perfil "scan": não sobe com `make sonar-up`; use `make sonar-scan`
  sonar-scanner:
    image: sonarsource/sonar-scanner-cli:11
    profiles: ["scan"]
    working_dir: /usr/src
    volumes:
      - .:/usr/src
    environment:
      SONAR_HOST_URL: http://sonarqube:9000
      SONAR_TOKEN: ${SONAR_TOKEN:-}
    depends_on:
      - sonarqube
    networks:
      - sonar

volumes:
  sonarqube_postgresql:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  sonarqube_temp:

networks:
  sonar:
    driver: bridge
